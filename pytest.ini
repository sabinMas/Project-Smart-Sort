[pytest]
# Pytest configuration for Box Smart Inbox

testpaths = backend/tests backend/domain_1_email/tests backend/domain_2_classifier/tests backend/domain_3_box_integration/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for organizing tests
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (may require external services)
    domain1: Email ingestion domain tests
    domain2: AI classification domain tests
    domain3: Box integration domain tests
    slow: Slow running tests

# Coverage settings
addopts =
    --strict-markers
    --tb=short
    --verbose
    -ra

# Asyncio mode
asyncio_mode = auto

# Minimum Python version
minversion = 7.0
